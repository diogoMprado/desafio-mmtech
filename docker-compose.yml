services:
  db:
    image: postgres:16-alpine
    container_name: mmtech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripplanner
      POSTGRES_PASSWORD: tripplanner123
      POSTGRES_DB: tripplannerdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripplanner -d tripplannerdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: mmtech-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: tripplanner
      DB_PASSWORD: tripplanner123
      DB_NAME: tripplannerdb
      ORS_API_KEY: ${ORS_API_KEY}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mmtech-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
